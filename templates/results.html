{% extends "base.html" %}

{% block content %}

    <div class="results-page">

        <h2>playlist generated!</h2>
        <h3>some {{ genre }} for {{ weather.lower() }} weather</h3>

        {% if tracks|length == 0 %}
            <p>No results found.</p>

        {% else %}

            {% for track in tracks %}

            <div class = "track-card">

                <img src="{{ track.image }}" alt="album art" class="album-art">
                <p>artist: {{ track.artist }}</p>
                <p>song: <a href="{{ track.url }}" target="blank">{{ track.name }}</a></p>
                <br>
            
            </div>
            {% endfor %}

        
        {% endif %}

    </div>

{% endblock %}
